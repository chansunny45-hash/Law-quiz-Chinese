<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>法考判断题刷题</title>
    <style>
:root {
  color-scheme: light;
  --ink: #17211d;
  --muted: #62706a;
  --line: #d9e1dc;
  --panel: #ffffff;
  --paper: #f4f7f4;
  --accent: #2d6a4f;
  --accent-strong: #1b4332;
  --accent-soft: #d8f3dc;
  --warn: #b42318;
  --warn-soft: #ffe5e1;
  --gold: #946200;
  --gold-soft: #fff2cc;
  font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
}

button,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.5;
}

.app-shell {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap: 24px;
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 32px 0;
}

.quiz-panel,
.side-panel {
  min-width: 0;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.05;
  letter-spacing: 0;
}

.mode-switch {
  display: inline-grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: var(--panel);
}

.mode-switch button {
  min-width: 74px;
  border: 0;
  border-right: 1px solid var(--line);
  padding: 10px 14px;
  background: transparent;
  color: var(--muted);
}

.mode-switch button:last-child {
  border-right: 0;
}

.mode-switch .is-active {
  background: var(--accent);
  color: white;
}

.filters {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}

label {
  display: grid;
  gap: 6px;
  width: min(360px, 100%);
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  background: white;
  color: var(--ink);
}

.ghost-button,
.nav-row button {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 14px;
  background: white;
  color: var(--ink);
}

.question-card {
  min-height: 540px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 28px;
  background: var(--panel);
  box-shadow: 0 18px 42px rgba(23, 33, 29, 0.08);
}

.question-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 14px;
}

.question-meta span {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 10px;
  background: #fbfdfb;
}

.progress-track {
  height: 8px;
  margin: 18px 0 30px;
  overflow: hidden;
  border-radius: 999px;
  background: #e7eee9;
}

.progress-track div {
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: var(--accent);
  transition: width 180ms ease;
}

.question-text {
  min-height: 168px;
  margin-bottom: 26px;
  font-size: clamp(22px, 3vw, 34px);
  line-height: 1.45;
  letter-spacing: 0;
}

.answer-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.answer-row button {
  display: grid;
  justify-items: start;
  min-height: 96px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  background: white;
  color: var(--ink);
  text-align: left;
  transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
}

.answer-row button:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}

.answer-row button span {
  margin-bottom: 4px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.answer-row .is-correct {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.answer-row .is-wrong {
  border-color: var(--warn);
  background: var(--warn-soft);
}

.feedback {
  display: grid;
  gap: 6px;
  margin-top: 18px;
  border-radius: 8px;
  padding: 14px 16px;
}

.feedback.is-right {
  background: var(--accent-soft);
  color: var(--accent-strong);
}

.feedback.is-wrong {
  background: var(--warn-soft);
  color: var(--warn);
}

.nav-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 22px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.stats-grid div {
  display: grid;
  gap: 4px;
  min-height: 86px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  background: white;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.stats-grid span {
  color: var(--ink);
  font-size: 24px;
  font-weight: 800;
}

.wrong-book {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  background: white;
}

.section-title {
  margin-bottom: 14px;
}

.section-title h2 {
  margin-bottom: 4px;
  font-size: 20px;
}

.section-title p,
.empty-state {
  margin-bottom: 0;
  color: var(--muted);
  font-size: 14px;
}

.wrong-book ul {
  display: grid;
  gap: 12px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.wrong-book li {
  border-top: 1px solid var(--line);
  padding-top: 12px;
}

.wrong-book li:first-child {
  border-top: 0;
  padding-top: 0;
}

.wrong-book button {
  display: grid;
  gap: 6px;
  width: 100%;
  border: 0;
  padding: 0;
  background: transparent;
  color: var(--ink);
  text-align: left;
  line-height: 1.45;
}

.wrong-book button span {
  color: var(--gold);
  font-size: 12px;
  font-weight: 800;
}

.wrong-book li p {
  margin: 8px 0 0;
  border-radius: 8px;
  padding: 10px;
  background: var(--gold-soft);
  color: #684500;
  font-size: 13px;
  line-height: 1.5;
}

@media (max-width: 920px) {
  .app-shell {
    grid-template-columns: 1fr;
  }

  .question-card {
    min-height: auto;
  }
}

@media (max-width: 620px) {
  .app-shell {
    width: min(100% - 20px, 1180px);
    padding: 18px 0;
  }

  .topbar,
  .filters {
    align-items: stretch;
    flex-direction: column;
  }

  .mode-switch {
    width: 100%;
  }

  .question-card {
    padding: 18px;
  }

  .question-text {
    min-height: 140px;
    font-size: 22px;
  }

  .answer-row,
  .stats-grid {
    grid-template-columns: 1fr;
  }
}

</style>
  </head>
  <body>
    <main class="app-shell">
      <section class="quiz-panel" aria-label="刷题区">
        <div class="topbar">
          <div>
            <p class="eyebrow">True / False</p>
            <h1>法考判断题刷题</h1>
          </div>
          <div class="mode-switch" aria-label="刷题模式">
            <button type="button" data-mode="all">全部</button>
            <button type="button" data-mode="wrong">错题</button>
          </div>
        </div>

        <div class="filters">
          <label>
            阶段
            <select data-phase-select></select>
          </label>
          <label>
            分类
            <select data-category-select></select>
          </label>
          <button type="button" class="ghost-button" data-clear>清空记录</button>
        </div>

        <article class="question-card">
          <div class="question-meta">
            <span data-phase></span>
            <span data-category></span>
            <span data-counter></span>
          </div>

          <div class="progress-track" aria-hidden="true">
            <div data-progress></div>
          </div>

          <p class="question-text" data-question></p>

          <div class="answer-row">
            <button type="button" data-answer="true">
              <span>True</span>
              正确
            </button>
            <button type="button" data-answer="false">
              <span>False</span>
              错误
            </button>
          </div>

          <div class="feedback" data-feedback hidden></div>

          <div class="nav-row">
            <button type="button" data-prev>上一题</button>
            <button type="button" data-next>下一题</button>
          </div>
        </article>
      </section>

      <aside class="side-panel" aria-label="学习记录">
        <section class="stats-grid">
          <div>
            <span data-completed>0/0</span>
            已答
          </div>
          <div>
            <span data-accuracy>0%</span>
            正确率
          </div>
          <div>
            <span data-wrong-count>0</span>
            错题
          </div>
        </section>

        <section class="wrong-book">
          <div class="section-title">
            <h2>错题本</h2>
            <p>选错后自动记录，答对后移出。</p>
          </div>
          <p class="empty-state" data-empty-wrong>暂无错题。</p>
          <ul data-wrong-list></ul>
        </section>
      </aside>
    </main>

    <script>
const questionBank = [
  {
    "id": "q-0001",
    "phase": "Phase 1",
    "category": "合法行政原则",
    "text": "行政法区别于民法的重要标志之一，是行政法强调对公权力的控制，而民法更强调意思自治。"
  },
  {
    "id": "q-0002",
    "phase": "Phase 1",
    "category": "合法行政原则",
    "text": "合法行政原则只要求行政行为不得违反法律，不要求行政机关必须有法律授权。"
  },
  {
    "id": "q-0003",
    "phase": "Phase 1",
    "category": "合法行政原则",
    "text": "法律优先是消极要求，即行政行为不得与现行法律相抵触。"
  },
  {
    "id": "q-0004",
    "phase": "Phase 1",
    "category": "合法行政原则",
    "text": "法律保留是积极要求，即行政机关作出行政行为必须有明确法律依据或授权。"
  },
  {
    "id": "q-0005",
    "phase": "Phase 1",
    "category": "合法行政原则",
    "text": "某地没有夜间禁止外出的法律规定，公安机关仍以维护治安为由禁止居民夜间外出，该行为主要违反法律优先原则。"
  },
  {
    "id": "q-0006",
    "phase": "Phase 1",
    "category": "合法行政原则",
    "text": "行政机关的行为只要目的正当，即使没有法律授权，也可以认定为合法。"
  },
  {
    "id": "q-0007",
    "phase": "Phase 1",
    "category": "合法行政原则",
    "text": "法律规定某违法行为最高罚款 500 元，行政机关罚款 5000 元，违反法律优先原则。"
  },
  {
    "id": "q-0008",
    "phase": "Phase 1",
    "category": "合法行政原则",
    "text": "“法律没有禁止行政机关这样做”并不当然意味着行政机关可以这样做。"
  },
  {
    "id": "q-0009",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "合理行政原则主要用来约束行政机关的裁量权。"
  },
  {
    "id": "q-0010",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "法律规定罚款 50 元至 2000 元，行政机关在该范围内作出处罚，就一定合法合理。"
  },
  {
    "id": "q-0011",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "同样违法行为，行政机关因一人“态度好”罚 50 元，因另一人“长得不顺眼”拘留 15 日，属于考虑无关因素。"
  },
  {
    "id": "q-0012",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "合理行政原则要求同等情况同等对待，不同情况可以合理区别对待。"
  },
  {
    "id": "q-0013",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "比例原则的核心要求可以概括为“少侵害”。"
  },
  {
    "id": "q-0014",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "比例原则只要求行政目的正当，不要求手段与目的之间具有适当关系。"
  },
  {
    "id": "q-0015",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "城管为了整治违法摊贩，采用下跪执法方式，如果该方式无助于实现管理目的，可能违反比例原则中的适当性要求。"
  },
  {
    "id": "q-0016",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "为查处违法搭建工棚，行政机关同时查封合法经营的商铺，可能违反比例原则。"
  },
  {
    "id": "q-0017",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "如果给狗注射疫苗、拴狗绳足以控制狂犬病风险，行政机关仍采取全城杀狗措施，通常违反损害最小原则。"
  },
  {
    "id": "q-0018",
    "phase": "Phase 1",
    "category": "合理行政与比例原则",
    "text": "采用非强制手段可以达到行政管理目的的，行政机关仍可以优先实施行政强制。"
  },
  {
    "id": "q-0019",
    "phase": "Phase 1",
    "category": "程序正当原则",
    "text": "程序正当原则只在实体结果错误时才有意义。"
  },
  {
    "id": "q-0020",
    "phase": "Phase 1",
    "category": "程序正当原则",
    "text": "行政机关作出不利决定前，通常应当告知事实、理由和依据，并听取陈述申辩。"
  },
  {
    "id": "q-0021",
    "phase": "Phase 1",
    "category": "程序正当原则",
    "text": "听证是一种更正式的陈述申辩方式，通常适用于重大、复杂或影响较重的行政决定。"
  },
  {
    "id": "q-0022",
    "phase": "Phase 1",
    "category": "程序正当原则",
    "text": "行政机关作出决定后说明理由并告知救济途径，也属于程序正当原则的要求。"
  },
  {
    "id": "q-0023",
    "phase": "Phase 1",
    "category": "程序正当原则",
    "text": "行政公开没有例外，所有行政信息都必须公开。"
  },
  {
    "id": "q-0024",
    "phase": "Phase 1",
    "category": "程序正当原则",
    "text": "执法人员与案件当事人存在近亲属关系时，应当适用回避制度。"
  },
  {
    "id": "q-0025",
    "phase": "Phase 1",
    "category": "程序正当原则",
    "text": "听证主持人可以由本案调查人员担任，只要其熟悉案情即可。"
  },
  {
    "id": "q-0026",
    "phase": "Phase 1",
    "category": "程序正当原则",
    "text": "程序正当原则包括公众参与、公开、回避等要求。"
  },
  {
    "id": "q-0027",
    "phase": "Phase 1",
    "category": "高效便民原则",
    "text": "高效便民原则要求行政机关既提高行政效率，也为公民、法人和其他组织提供便利。"
  },
  {
    "id": "q-0028",
    "phase": "Phase 1",
    "category": "高效便民原则",
    "text": "行政机关可以为了便民而违反法定程序。"
  },
  {
    "id": "q-0029",
    "phase": "Phase 1",
    "category": "高效便民原则",
    "text": "行政机关对申请材料不清楚的，应尽可能明确告知申请人办理流程和补正要求。"
  },
  {
    "id": "q-0030",
    "phase": "Phase 1",
    "category": "高效便民原则",
    "text": "高效便民原则只要求行政机关速度快，不要求服务清晰、便利。"
  },
  {
    "id": "q-0031",
    "phase": "Phase 1",
    "category": "诚实守信与信赖保护",
    "text": "行政机关公开的信息应当全面、准确、真实，体现诚实守信原则。"
  },
  {
    "id": "q-0032",
    "phase": "Phase 1",
    "category": "诚实守信与信赖保护",
    "text": "诚实守信原则只包括行政信息真实，不包括信赖保护。"
  },
  {
    "id": "q-0033",
    "phase": "Phase 1",
    "category": "诚实守信与信赖保护",
    "text": "行政机关不得随意撤销、变更已经生效的行政决定。"
  },
  {
    "id": "q-0034",
    "phase": "Phase 1",
    "category": "诚实守信与信赖保护",
    "text": "因公共利益需要撤回原合法行政许可或行政决定，原则上不需要补偿相对人。"
  },
  {
    "id": "q-0035",
    "phase": "Phase 1",
    "category": "诚实守信与信赖保护",
    "text": "政府招商引资时承诺奖励，企业基于该承诺投资后，政府无正当理由拒绝兑现，可能违反诚实守信原则。"
  },
  {
    "id": "q-0036",
    "phase": "Phase 1",
    "category": "诚实守信与信赖保护",
    "text": "行政机关违法行为造成损害，通常适用赔偿；合法行为造成特别损失，通常适用补偿。"
  },
  {
    "id": "q-0037",
    "phase": "Phase 1",
    "category": "诚实守信与信赖保护",
    "text": "为修建高铁依法征收房屋并给予补偿，体现的是违法责任承担。"
  },
  {
    "id": "q-0038",
    "phase": "Phase 1",
    "category": "诚实守信与信赖保护",
    "text": "信赖保护原则只保护已经取得合法有效权益的相对人，不保护基于无效行政行为形成的非法期待。"
  },
  {
    "id": "q-0039",
    "phase": "Phase 1",
    "category": "权责统一原则",
    "text": "权责统一原则要求行政机关有权力，也必须承担相应责任。"
  },
  {
    "id": "q-0040",
    "phase": "Phase 1",
    "category": "权责统一原则",
    "text": "行政机关违法侵权造成损害时，可能承担国家赔偿责任。"
  },
  {
    "id": "q-0041",
    "phase": "Phase 1",
    "category": "权责统一原则",
    "text": "行政机关合法征收造成财产损失，属于权责统一原则中的“违法受追究”。"
  },
  {
    "id": "q-0042",
    "phase": "Phase 1",
    "category": "权责统一原则",
    "text": "对违法行使职权的公务员进行内部处分，也属于权责统一原则的体现。"
  },
  {
    "id": "q-0043",
    "phase": "Phase 1",
    "category": "权责统一原则",
    "text": "行政机关享有强制、处罚等执法权时，其行使权力仍需接受监督。"
  },
  {
    "id": "q-0044",
    "phase": "Phase 1",
    "category": "行政主体基础",
    "text": "行政主体是指在行政法律关系中行使公共权力并能承担相应法律责任的组织。"
  },
  {
    "id": "q-0045",
    "phase": "Phase 1",
    "category": "行政主体基础",
    "text": "所有行政机关在任何场合都是行政主体。"
  },
  {
    "id": "q-0046",
    "phase": "Phase 1",
    "category": "行政主体基础",
    "text": "非行政机关在任何情况下都不能成为行政主体。"
  },
  {
    "id": "q-0047",
    "phase": "Phase 1",
    "category": "行政主体基础",
    "text": "行政主体概念比行政机关概念更宽。"
  },
  {
    "id": "q-0048",
    "phase": "Phase 1",
    "category": "行政主体基础",
    "text": "公务员执行职务时造成的法律后果，通常由其所属行政主体承担。"
  },
  {
    "id": "q-0049",
    "phase": "Phase 1",
    "category": "行政主体基础",
    "text": "行政机关内设机构通常不具有独立行政主体资格。"
  },
  {
    "id": "q-0050",
    "phase": "Phase 1",
    "category": "行政主体基础",
    "text": "对司法考试成绩处理不服，原则上应以司法部为被告，而不是以其内部命题处为被告。"
  },
  {
    "id": "q-0051",
    "phase": "Phase 1",
    "category": "行政机关、派出机关、派出机构",
    "text": "街道办事处属于派出机关，通常具有行政主体资格。"
  },
  {
    "id": "q-0052",
    "phase": "Phase 1",
    "category": "行政机关、派出机关、派出机构",
    "text": "公安派出所属于派出机关。"
  },
  {
    "id": "q-0053",
    "phase": "Phase 1",
    "category": "行政机关、派出机关、派出机构",
    "text": "派出机构原则上不具有独立行政主体资格，但法律、法规、规章授权时可能例外。"
  },
  {
    "id": "q-0054",
    "phase": "Phase 1",
    "category": "行政机关、派出机关、派出机构",
    "text": "派出所作出法律授权范围内的处罚时，可以在相应范围内作为行政主体。"
  },
  {
    "id": "q-0055",
    "phase": "Phase 1",
    "category": "行政机关、派出机关、派出机构",
    "text": "临时机构如拆迁指挥部通常具有独立行政主体资格。"
  },
  {
    "id": "q-0056",
    "phase": "Phase 1",
    "category": "行政机关、派出机关、派出机构",
    "text": "议事协调机构主要负责协调部门关系，通常不是直接管理公民的行政主体。"
  },
  {
    "id": "q-0057",
    "phase": "Phase 1",
    "category": "授权与委托",
    "text": "授权会产生新的行政主体，委托不会产生新的行政主体。"
  },
  {
    "id": "q-0058",
    "phase": "Phase 1",
    "category": "授权与委托",
    "text": "被授权组织可以在授权范围内以自己名义作出行政行为，并独立承担责任。"
  },
  {
    "id": "q-0059",
    "phase": "Phase 1",
    "category": "授权与委托",
    "text": "受委托组织可以以自己名义作出行政行为，并独立作为被告。"
  },
  {
    "id": "q-0060",
    "phase": "Phase 1",
    "category": "授权与委托",
    "text": "县政府红头文件可以当然创设一个新的行政主体。"
  },
  {
    "id": "q-0061",
    "phase": "Phase 1",
    "category": "授权与委托",
    "text": "行政委托中，受委托组织行为违法的，被告通常是委托机关。"
  },
  {
    "id": "q-0062",
    "phase": "Phase 1",
    "category": "授权与委托",
    "text": "行政授权和行政委托最大的区别之一，是被告确定不同。"
  },
  {
    "id": "q-0063",
    "phase": "Phase 1",
    "category": "被告判断基础",
    "text": "判断行政诉讼被告时，应先判断行为人是否具有行政主体资格，再判断以谁名义作出行为。"
  },
  {
    "id": "q-0064",
    "phase": "Phase 1",
    "category": "被告判断基础",
    "text": "一个内设机构即使没有行政主体资格，只要盖了自己的章，就可以成为行政诉讼被告。"
  },
  {
    "id": "q-0065",
    "phase": "Phase 1",
    "category": "被告判断基础",
    "text": "临时拆迁指挥部以自己名义实施强拆，通常应以设立它的行政机关为被告。"
  },
  {
    "id": "q-0066",
    "phase": "Phase 1",
    "category": "被告判断基础",
    "text": "若两个主体均具有行政主体资格，再看行政文书署名、盖章确定被告。"
  },
  {
    "id": "q-0067",
    "phase": "Phase 1",
    "category": "被告判断基础",
    "text": "行政机关越权作出行为时，一定不能成为被告。"
  },
  {
    "id": "q-0068",
    "phase": "Phase 1",
    "category": "被告判断基础",
    "text": "受委托组织超出委托权限实施行政行为的，仍可能由委托机关承担相应责任。"
  },
  {
    "id": "q-0069",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "抽象行政行为的核心特征是对象不特定、可以反复适用、具有普遍约束力。"
  },
  {
    "id": "q-0070",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "市政府规定“凡在本市机场吸烟者罚款 50 元”，属于具体行政行为。"
  },
  {
    "id": "q-0071",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "公安局对张三在机场吸烟作出罚款 50 元决定，属于抽象行政行为。"
  },
  {
    "id": "q-0072",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "抽象行政行为通常表现为行政法规、规章、行政规范性文件等。"
  },
  {
    "id": "q-0073",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "具体行政行为是适用规则，抽象行政行为是创设规则。"
  },
  {
    "id": "q-0074",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "判断一个文件是抽象还是具体，只看文件标题是否叫“通知”“通告”。"
  },
  {
    "id": "q-0075",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "通告附件列明 100 家企业，并要求这些企业两年内关闭，该通告属于具体行政行为。"
  },
  {
    "id": "q-0076",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "“凡本市污染企业均应缴纳排污费”的规定属于具体行政行为。"
  },
  {
    "id": "q-0077",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "抽象行政行为原则上不能单独提起行政诉讼。"
  },
  {
    "id": "q-0078",
    "phase": "Phase 2",
    "category": "抽象行政行为基础",
    "text": "行政诉讼中可以直接起诉部门规章。"
  },
  {
    "id": "q-0079",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规由国务院制定。"
  },
  {
    "id": "q-0080",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "地方政府可以向国务院报送行政法规立项申请。"
  },
  {
    "id": "q-0081",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "国务院年度立法工作计划由国务院法制机构最终决定。"
  },
  {
    "id": "q-0082",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规起草过程中，涉及其他部门职责或利益的，应征求相关部门意见。"
  },
  {
    "id": "q-0083",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规草案通常由国务院法制机构进行统一审查。"
  },
  {
    "id": "q-0084",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规经审查后，通常提交国务院常务会议或全体会议讨论决定。"
  },
  {
    "id": "q-0085",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规由国务院总理签署国务院令公布。"
  },
  {
    "id": "q-0086",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规应当以国家主席令公布。"
  },
  {
    "id": "q-0087",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规公布后，一律自公布之日起立即施行。"
  },
  {
    "id": "q-0088",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规公布后 30 日内，应报全国人大常委会备案。"
  },
  {
    "id": "q-0089",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规解释权属于国务院。"
  },
  {
    "id": "q-0090",
    "phase": "Phase 2",
    "category": "行政法规制定程序",
    "text": "行政法规解释必须完整经过立项、起草、审查、审议、公布全过程。"
  },
  {
    "id": "q-0091",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "部门规章由国务院各部、委员会、中国人民银行、审计署和具有行政管理职能的直属机构等制定。"
  },
  {
    "id": "q-0092",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "国务院组成部门管理的国家局，一般当然具有部门规章制定权。"
  },
  {
    "id": "q-0093",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "地方政府规章的制定主体包括省级政府、设区的市政府、自治州政府。"
  },
  {
    "id": "q-0094",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "规章可以称为“条例”。"
  },
  {
    "id": "q-0095",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "文件编号中出现“令”，通常可以作为判断规章的重要标志。"
  },
  {
    "id": "q-0096",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "联合制定的部门规章，应由联合制定部门的首长共同署名公布。"
  },
  {
    "id": "q-0097",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "规章制定必须开会决定，不能适用行政法规中的“传批”方式。"
  },
  {
    "id": "q-0098",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "规章应自施行之日起 30 日内备案。"
  },
  {
    "id": "q-0099",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "部门规章应报国务院备案。"
  },
  {
    "id": "q-0100",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "地方政府规章只需报本级人大常委会备案，不需报国务院备案。"
  },
  {
    "id": "q-0101",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "起草规章可以邀请专家参加，也可以委托专家、组织起草。"
  },
  {
    "id": "q-0102",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "规章送审稿的审查由国务院法制机构统一审查。"
  },
  {
    "id": "q-0103",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "法制机构认为制定规章条件不成熟时，只能退回起草单位。"
  },
  {
    "id": "q-0104",
    "phase": "Phase 2",
    "category": "行政规章制定程序",
    "text": "公民认为规章与法律、行政法规相抵触，可以向国务院书面提出审查建议。"
  },
  {
    "id": "q-0105",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "具体行政行为通常是行政机关针对特定人或特定事项作出的外部行政管理行为。"
  },
  {
    "id": "q-0106",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "判断具体行政行为的四大标准是特定性、处分性、外部性、行政性。"
  },
  {
    "id": "q-0107",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "只要行为由行政机关作出，就一定属于具体行政行为。"
  },
  {
    "id": "q-0108",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "对名单上的 100 家企业作出限期整改决定，虽然人数很多，也可能属于具体行政行为。"
  },
  {
    "id": "q-0109",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "具体行政行为的特定性要求对象只能是一个人。"
  },
  {
    "id": "q-0110",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "处分性要求行政行为对相对人的权利义务产生实际法律影响。"
  },
  {
    "id": "q-0111",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "行政机关发出听证通知，通常属于过程性行为，不宜单独起诉。"
  },
  {
    "id": "q-0112",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "补正材料通知通常是最终行政决定，可以直接起诉。"
  },
  {
    "id": "q-0113",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "行政机关作出的行政指导原则上不具有强制力，因此通常不可诉。"
  },
  {
    "id": "q-0114",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "行政机关名义上“建议”企业作某事，但不照做就会影响年检，该行为可能具有可诉性。"
  },
  {
    "id": "q-0115",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "行政调解协议通常具有强制执行力，属于典型具体行政行为。"
  },
  {
    "id": "q-0116",
    "phase": "Phase 2",
    "category": "具体行政行为四大判断标准",
    "text": "以调解为名威胁一方接受方案，否则给予更重处罚，可能构成可诉行政行为。"
  },
  {
    "id": "q-0117",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "判断内外部行为，应看行政行为针对的是相对人的普通人身份还是公务员等内部身份。"
  },
  {
    "id": "q-0118",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "警察因私家车违章被罚款，属于内部行政行为。"
  },
  {
    "id": "q-0119",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "警察因上班赌博被单位记过处分，属于内部行为。"
  },
  {
    "id": "q-0120",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "公务员对处分不服，通常通过行政诉讼解决。"
  },
  {
    "id": "q-0121",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "法院判决、裁定属于司法行为，不能通过行政诉讼救济。"
  },
  {
    "id": "q-0122",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "公安机关依据《刑事诉讼法》作出的刑事拘留，通常属于行政行为。"
  },
  {
    "id": "q-0123",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "公安机关以刑事拘留名义帮助债权人讨债，可能构成“假刑事、真行政”。"
  },
  {
    "id": "q-0124",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "行政机关严格按照法院协助执行文书办理过户，通常属于司法协助行为的延伸。"
  },
  {
    "id": "q-0125",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "行政机关超出法院协助执行文书范围，额外处分房产的，超出部分可能构成行政行为。"
  },
  {
    "id": "q-0126",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "政府采购办公用品一般属于民事行为，而非行政行为。"
  },
  {
    "id": "q-0127",
    "phase": "Phase 2",
    "category": "外部性、行政性与排除项",
    "text": "国防、外交等国家行为通常不属于行政诉讼受案范围。"
  },
  {
    "id": "q-0128",
    "phase": "Phase 2",
    "category": "行政行为分类",
    "text": "依职权行政行为是行政机关主动发起的行为。"
  },
  {
    "id": "q-0129",
    "phase": "Phase 2",
    "category": "行政行为分类",
    "text": "依申请行政行为必须以相对人申请为启动条件。"
  },
  {
    "id": "q-0130",
    "phase": "Phase 2",
    "category": "行政行为分类",
    "text": "羁束行为中，行政机关没有或几乎没有选择空间。"
  },
  {
    "id": "q-0131",
    "phase": "Phase 2",
    "category": "行政行为分类",
    "text": "裁量行为中，行政机关可以完全不受约束地自由选择。"
  },
  {
    "id": "q-0132",
    "phase": "Phase 2",
    "category": "行政行为分类",
    "text": "授益行为与负担行为是一组相对概念。"
  },
  {
    "id": "q-0133",
    "phase": "Phase 2",
    "category": "行政行为分类",
    "text": "羁束行为与授益行为是一组相对概念。"
  },
  {
    "id": "q-0134",
    "phase": "Phase 2",
    "category": "行政行为分类",
    "text": "行政许可通常属于授益行政行为。"
  },
  {
    "id": "q-0135",

    "phase": "Phase 2",

  {

    "phase": "Phase 2",

  {
    "id": "q-0155",
    "phase": "Phase 2",

  {

    "phase": "Phase 2",

  {

  {

  {
    "id": "q-0164",
    "phase": "Phase 2",

  {
    "id": "q-0165",
    "phase": "Phase 2",
    "category": "无效、撤销、废止",

    "phase": "Phase 2",
    "category": "无效、撤销、废止",

    "phase": "Phase 2",
    "category": "行政确认、裁决、给付、奖励、征收、征用",

  {
    "id": "q-0172",
    "phase": "Phase 2",
    "category": "行政确认、裁决、给付、奖励、征收、征用",

  {
    "id": "q-0173",
    "phase": "Phase 2",
    "category": "行政确认、裁决、给付、奖励、征收、征用",

  {
    "id": "q-0174",
    "phase": "Phase 2",
    "category": "行政确认、裁决、给付、奖励、征收、征用",

  {
    "id": "q-0175",
    "phase": "Phase 2",
    "category": "行政确认、裁决、给付、奖励、征收、征用",

  {
    "id": "q-0176",
    "phase": "Phase 2",

    "id": "q-0177",

  {
    "id": "q-0178",
    "phase": "Phase 2",
    "category": "行政确认、裁决、给付、奖励、征收、征用",

  {
    "id": "q-0179",
    "phase": "Phase 2",
    "category": "行政确认、裁决、给付、奖励、征收、征用",

    "phase": "Phase 2",
    "category": "行政确认、裁决、给付、奖励、征收、征用",

  },
  {
    "id": "q-0185",
    "phase": "Phase 3",
    "category": "行政许可基础",
    "text": "行政许可是行政机关根据申请，经依法审查，准予相对人从事特定活动的行为。"

  {
    "id": "q-0186",
    "phase": "Phase 3",
    "category": "行政许可基础",
    "text": "行政许可可以由行政机关主动发起，无需申请人申请。"
  },
  {
    "id": "q-0187",
    "phase": "Phase 3",
    "category": "行政许可基础",
    "text": "行政许可通常属于授益行政行为。"
  },
  {
    "id": "q-0188",
    "phase": "Phase 3",
    "category": "行政许可基础",
    "text": "行政许可原则上是要式行政行为，通常要求书面形式。"
  },
  {
    "id": "q-0189",
    "phase": "Phase 3",
    "category": "行政许可基础",
    "text": "行政许可的根本目的之一是维护社会公共利益和公共秩序。"
  },
  {
    "id": "q-0190",
    "phase": "Phase 3",
    "category": "行政许可基础",
    "text": "所有行政登记都属于行政许可。"
  },
  {
    "id": "q-0191",
    "phase": "Phase 3",
    "category": "行政许可基础",
    "text": "企业设立登记因赋予法人资格，通常具有行政许可属性。"

  {
    "id": "q-0192",
    "phase": "Phase 3",
    "category": "行政许可基础",
    "text": "不动产变更登记通常属于行政确认，而不是行政许可。"

  {
    "id": "q-0193",
    "phase": "Phase 3",
    "category": "行政许可类型",
    "text": "一般许可主要审查申请人是否符合法定条件。"

  {
    "id": "q-0194",
    "phase": "Phase 3",
    "category": "行政许可类型",
    "text": "特许主要涉及有限自然资源开发利用、公共资源配置或特定行业市场准入。"

  {
    "id": "q-0195",
    "phase": "Phase 3",
    "category": "行政许可类型",
    "text": "特许通常通过考试方式确定申请人资格。"
  },
  {
    "id": "q-0196",
    "phase": "Phase 3",
    "category": "行政许可类型",
    "text": "认可主要审查申请人是否具备特定资格、资质、技能或信誉。"

  {
    "id": "q-0197",
    "phase": "Phase 3",
    "category": "行政许可类型",
    "text": "对自然人资格的认可，通常可以通过考试方式进行。"
  },
  {
    "id": "q-0198",
    "phase": "Phase 3",
    "category": "行政许可类型",
    "text": "核准通常针对物品、设施、设备是否符合技术、安全标准。"
  },
  {
    "id": "q-0199",
    "phase": "Phase 3",
    "category": "行政许可类型",
    "text": "执业医师资格属于核准，因为它关系人身健康。"
  },
  {
    "id": "q-0200",
    "phase": "Phase 3",
    "category": "行政许可类型",
    "text": "电梯安全检验合格属于认可。"
  },
  {
    "id": "q-0201",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "法律可以设定行政许可。"
  },
  {
    "id": "q-0202",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "行政法规可以设定行政许可。"
  },
  {
    "id": "q-0203",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "必要时，国务院可以采用发布决定的方式设定行政许可。"
  },
  {
    "id": "q-0204",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "国务院部门规章可以设定行政许可。"
  },
  {
    "id": "q-0205",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "省级政府规章可以设定长期稳定实施的经常性行政许可。"
  },
  {
    "id": "q-0206",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "省级政府规章可以设定临时性行政许可。"
  },
  {
    "id": "q-0207",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "其他规范性文件可以设定行政许可。"
  },
  {
    "id": "q-0208",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "地方性法规可以设定行政许可，但不得设定国家统一资格、资质许可。"
  },
  {
    "id": "q-0209",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "地方性法规可以设定企业设立登记及其前置性许可。"
  },
  {
    "id": "q-0210",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "地方性法规不得以许可方式限制外地商品、服务进入本地市场。"
  },
  {
    "id": "q-0211",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "部门规章虽然不能设定行政许可，但可以在上位法设定的许可事项范围内作具体规定。"
  },
  {
    "id": "q-0212",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "下位法对上位法设定的行政许可作具体规定时，可以增设许可条件。"
  },
  {
    "id": "q-0213",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "下位法对上位法行政许可作具体规定，可以变相增加申请人义务。"
  },
  {
    "id": "q-0214",
    "phase": "Phase 3",
    "category": "行政许可设定权",
    "text": "省级政府经国务院批准，可以在本行政区域停止实施部分行政法规设定的有关经济事务许可。"
  },
  {
    "id": "q-0215",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政许可最常见的实施主体是有许可权的行政机关。"
  },
  {
    "id": "q-0216",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "法律、法规授权的组织可以以自己名义实施行政许可。"
  },
  {
    "id": "q-0217",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "规章可以授权非行政机关组织实施行政许可。"
  },
  {
    "id": "q-0218",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政许可可以委托其他行政机关实施。"
  },
  {
    "id": "q-0219",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政许可可以委托行业协会、企业或个人实施。"
  },
  {
    "id": "q-0220",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "受委托机关实施行政许可，应以委托机关名义办理。"
  },
  {
    "id": "q-0221",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "受委托机关可以再委托其他组织实施行政许可。"
  },
  {
    "id": "q-0222",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "申请行政许可原则上只能到行政机关办公场所提交纸质申请。"
  },
  {
    "id": "q-0223",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "申请人应对申请材料实质内容的真实性负责。"
  },
  {
    "id": "q-0224",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "申请材料不齐全的，行政机关应直接作出不予许可决定。"
  },
  {
    "id": "q-0225",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政机关提供行政许可申请格式文本，原则上不得收费。"
  },
  {
    "id": "q-0226",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政机关审查行政许可申请时，需要核实实质内容的，应当指派两名以上工作人员。"
  },
  {
    "id": "q-0227",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "准予行政许可的决定通常应当公开，公众有权查阅。"
  },
  {
    "id": "q-0228",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "不予行政许可决定也必须一律向社会公开。"
  },
  {
    "id": "q-0229",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政许可听证涉及申请人与他人重大利益关系时，应告知申请人和利害关系人有要求听证的权利。"
  },
  {
    "id": "q-0230",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政许可听证中，申请人和利害关系人应在被告知听证权利后五日内提出听证申请。"
  },
  {
    "id": "q-0231",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政机关应在接到行政许可听证申请后二十日内组织听证。"
  },
  {
    "id": "q-0232",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政许可听证应在举行听证七日前通知时间、地点。"
  },
  {
    "id": "q-0233",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政许可听证笔录只是行政机关作出许可决定时的参考材料。"
  },
  {
    "id": "q-0234",
    "phase": "Phase 3",
    "category": "行政许可实施主体与程序",
    "text": "行政许可原则上可以转让。"
  },
  {
    "id": "q-0235",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "吊销行政许可属于行政处罚。"
  },
  {
    "id": "q-0236",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "撤销行政许可属于行政处罚。"
  },
  {
    "id": "q-0237",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "撤回行政许可属于行政处罚。"
  },
  {
    "id": "q-0238",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "注销行政许可属于行政处罚。"
  },
  {
    "id": "q-0239",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "许可本身合法，被许可人事后严重违法，应适用吊销。"
  },
  {
    "id": "q-0240",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "申请人通过欺骗、贿赂取得许可，行政机关应撤销许可。"
  },
  {
    "id": "q-0241",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "许可原本合法，后来因公共利益和客观情况重大变化不宜继续，应撤回或变更许可。"
  },
  {
    "id": "q-0242",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "行政许可有效期届满未延续的，行政机关应办理注销手续。"
  },
  {
    "id": "q-0243",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "行政许可被吊销、撤销、撤回后，均可能引发注销手续。"
  },
  {
    "id": "q-0244",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "因行政机关违法发证导致许可被撤销，造成被许可人损失的，可能需要赔偿。"
  },
  {
    "id": "q-0245",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "因申请人欺诈取得许可被撤销，申请人通常可以请求补偿。"
  },
  {
    "id": "q-0246",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "合法许可因公共利益被撤回，造成财产损失的，通常应补偿。"
  },
  {
    "id": "q-0247",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "特许被撤回时，补偿通常更重视实际投入。"
  },
  {
    "id": "q-0248",
    "phase": "Phase 3",
    "category": "行政许可后续处理",
    "text": "当事人因行政机关撤回许可主张补偿的，通常应先向行政机关提出补偿申请。"
  },
  {
    "id": "q-0249",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "行政处罚的核心是对违反行政管理秩序者进行惩戒。"
  },
  {
    "id": "q-0250",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "行政处罚的本质特征是增加额外负担或减损既有权益。"
  },
  {
    "id": "q-0251",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "责令改正通常属于行政处罚。"
  },
  {
    "id": "q-0252",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "罚款属于行政处罚。"
  },
  {
    "id": "q-0253",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "没收违法所得属于行政处罚。"
  },
  {
    "id": "q-0254",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "警告和通报批评属于行政处罚。"
  },
  {
    "id": "q-0255",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "行政拘留属于行政处罚。"
  },
  {
    "id": "q-0256",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "暂扣、吊销许可证件属于行政处罚。"
  },
  {
    "id": "q-0257",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "责令停产停业、责令关闭、限制从业属于行政处罚。"
  },
  {
    "id": "q-0258",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "取缔无证经营场所通常属于行政处罚。"
  },
  {
    "id": "q-0259",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "撤销骗取的许可证属于行政处罚。"
  },
  {
    "id": "q-0260",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "许可期内责令停止经营，可能属于行政处罚。"
  },
  {
    "id": "q-0261",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "许可已经到期后责令停止经营，通常更接近责令改正。"
  },
  {
    "id": "q-0262",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "责令召回不符合药品安全标准的药品，通常不是行政处罚。"
  },
  {
    "id": "q-0263",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "责令补种树木在某些特别法中可能被作为行政处罚处理。"
  },
  {
    "id": "q-0264",
    "phase": "Phase 3",
    "category": "行政处罚基础",
    "text": "暂扣驾驶证通常属于资格罚。"
  },
  {
    "id": "q-0265",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "法律可以设定所有种类的行政处罚，包括限制人身自由。"
  },
  {
    "id": "q-0266",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "行政法规可以设定行政拘留。"
  },
  {
    "id": "q-0267",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "地方性法规可以设定吊销营业执照。"
  },
  {
    "id": "q-0268",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "地方性法规可以设定除限制人身自由、吊销营业执照以外的处罚。"
  },
  {
    "id": "q-0269",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "部门规章可以设定警告、通报批评和一定数额罚款。"
  },
  {
    "id": "q-0270",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "地方政府规章可以设定行政拘留。"
  },
  {
    "id": "q-0271",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "规章可以补充设定行政处罚。"
  },
  {
    "id": "q-0272",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "行政法规和地方性法规在上位法只规定违法行为未规定处罚时，可以依法补充设定处罚。"
  },
  {
    "id": "q-0273",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "部门规章可以对违法所得计算方式作特别规定。"
  },
  {
    "id": "q-0274",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "规章可以对普通程序作出处罚决定的期限另有规定。"
  },
  {
    "id": "q-0275",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "规章可以对行政处罚简易程序适用范围另有规定。"
  },
  {
    "id": "q-0276",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "规章可以对行政处罚地域管辖另有规定。"
  },
  {
    "id": "q-0277",
    "phase": "Phase 3",
    "category": "行政处罚设定权",
    "text": "规章可以对行政处罚级别管辖另有规定。"
  },
  {
    "id": "q-0278",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "行政处罚通常由具有行政处罚权的行政机关实施。"
  },
  {
    "id": "q-0279",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "综合行政执法机关可以集中行使有关行政处罚权。"
  },
  {
    "id": "q-0280",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "限制人身自由的行政处罚权可以划转给综合行政执法机关。"
  },
  {
    "id": "q-0281",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "行政处罚可以依法委托符合条件的组织实施。"
  },
  {
    "id": "q-0282",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "受委托组织可以以自己名义实施行政处罚。"
  },
  {
    "id": "q-0283",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "行政处罚权下放给乡镇政府、街道办事处后，具体采用授权或委托模式，可能影响名义和责任承担。"
  },
  {
    "id": "q-0284",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "省、自治区、直辖市可以决定将部分基层管理迫切需要的县级部门处罚权交由乡镇、街道行使。"
  },
  {
    "id": "q-0285",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "行政处罚权下放决定应当公布。"
  },
  {
    "id": "q-0286",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "行政处罚管辖原则上由违法行为发生地行政机关管辖。"
  },
  {
    "id": "q-0287",
    "phase": "Phase 3",
    "category": "行政处罚实施主体与管辖",
    "text": "行政处罚一律由违法行为人住所地机关管辖。"
  },
  {
    "id": "q-0288",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "行政处罚程序包括简易程序、普通程序和听证程序。"
  },
  {
    "id": "q-0289",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "违法事实确凿并有法定依据，对公民处 200 元以下罚款或警告的，可以适用简易程序。"
  },
  {
    "id": "q-0290",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "对法人或其他组织处 3000 元以下罚款或警告的，可以适用简易程序。"
  },
  {
    "id": "q-0291",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "对公民罚款 300 元，可以适用普通《行政处罚法》简易程序。"
  },
  {
    "id": "q-0292",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "简易程序下，执法人员可以当场作出处罚决定。"
  },
  {
    "id": "q-0293",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "普通程序中，行政机关作出处罚前应告知拟处罚内容、事实、理由和依据。"
  },
  {
    "id": "q-0294",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "行政机关可以因当事人申辩而加重处罚。"
  },
  {
    "id": "q-0295",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "行政处罚普通程序中，违法事实不清、证据不足的，不得给予处罚。"
  },
  {
    "id": "q-0296",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "行政处罚案件普通程序原则上应自立案之日起 90 日内作出处罚决定。"
  },
  {
    "id": "q-0297",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "行政处罚听证只能由行政机关依职权主动启动。"
  },
  {
    "id": "q-0298",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "较大数额罚款、没收较大数额违法所得、吊销许可证、责令停产停业等，通常属于应告知听证权的事项。"
  },
  {
    "id": "q-0299",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "行政拘留在普通行政处罚法框架下通常不属于当然听证范围。"
  },
  {
    "id": "q-0300",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "当事人要求行政处罚听证，应在行政机关告知后五日内提出。"
  },
  {
    "id": "q-0301",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "行政机关组织处罚听证，应在听证七日前通知时间、地点。"
  },
  {
    "id": "q-0302",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "行政处罚听证费用由申请听证的当事人承担。"
  },
  {
    "id": "q-0303",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "行政处罚听证中，当事人可以委托代理人。"
  },
  {
    "id": "q-0304",
    "phase": "Phase 3",
    "category": "行政处罚程序",
    "text": "听证主持人可以由本案调查人员担任。"
  },
  {
    "id": "q-0305",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "不满十四周岁的未成年人有违法行为的，不予行政处罚。"
  },
  {
    "id": "q-0306",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "已满十四周岁不满十八周岁的人违法，应当从轻或减轻处罚。"
  },
  {
    "id": "q-0307",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "精神病人、智力残疾人在不能辨认或不能控制自己行为时违法，不予处罚。"
  },
  {
    "id": "q-0308",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "当事人能够证明没有主观过错的，一般不予处罚，法律、行政法规另有规定除外。"
  },
  {
    "id": "q-0309",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "初次违法且危害后果轻微并及时改正的，可以不予行政处罚。"
  },
  {
    "id": "q-0310",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "一事不再罚原则是指同一违法行为不得给予两次以上任何行政处罚。"
  },
  {
    "id": "q-0311",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "同一违法行为违反多个法律规范且均规定罚款的，应选择罚款数额高的规定处罚。"
  },
  {
    "id": "q-0312",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "一事不再罚原则不妨碍依法责令改正与罚款并用。"
  },
  {
    "id": "q-0313",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "行政处罚一般追责时效为两年。"
  },
  {
    "id": "q-0314",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "涉及公民生命健康安全、金融安全且有危害后果的，处罚时效可延长至五年。"
  },
  {
    "id": "q-0315",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "治安管理违法行为的追责时效通常为六个月。"
  },
  {
    "id": "q-0316",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "连续违法行为的处罚时效从第一次违法行为发生之日起算。"
  },
  {
    "id": "q-0317",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "已执行的行政拘留，后来被判处拘役或有期徒刑的，可以依法折抵刑期。"
  },
  {
    "id": "q-0318",
    "phase": "Phase 3",
    "category": "行政处罚实体规则",
    "text": "已缴纳的行政罚款，后来被判处罚金的，可以依法折抵罚金。"
  },
  {
    "id": "q-0319",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "治安管理处罚属于行政处罚的一种。"
  },
  {
    "id": "q-0320",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "公安机关办理治安案件，原则上自受理之日起三十日内作出处罚决定。"
  },
  {
    "id": "q-0321",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "治安案件重大、复杂的，经上一级公安机关批准可以延长三十日。"
  },
  {
    "id": "q-0322",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "治安案件询问查证时间原则上不得超过八小时。"
  },
  {
    "id": "q-0323",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "治安案件情况复杂，可能适用行政拘留的，询问查证时间不得超过二十四小时。"
  },
  {
    "id": "q-0324",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "证人和被侵害人也可以被公安机关传唤。"
  },
  {
    "id": "q-0325",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "行政拘留决定作出后，应及时通知被处罚人家属。"
  },
  {
    "id": "q-0326",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "一人有两种以上违反治安管理行为的，分别决定、合并执行，行政拘留合并执行最长不超过二十日。"
  },
  {
    "id": "q-0327",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "对行政拘留不服申请复议或提起诉讼的，行政拘留处罚自动停止执行。"
  },
  {
    "id": "q-0328",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "被处罚人申请暂缓执行行政拘留，还需满足公安机关认为不致发生社会危险，并提供担保人或保证金等条件。"
  },
  {
    "id": "q-0329",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "有被侵害人的，公安机关应将治安处罚决定书副本抄送被侵害人。"
  },
  {
    "id": "q-0330",
    "phase": "Phase 3",
    "category": "治安管理处罚专题",
    "text": "对违反治安管理的外国人，可以附加适用限期出境或驱逐出境。"
  },
  {
    "id": "q-0331",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "行政强制包括行政强制措施和行政强制执行。"
  },
  {
    "id": "q-0332",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "行政强制措施是为制止违法、防止证据损毁、避免危险发生、控制事态扩大而采取的临时控制行为。"
  },
  {
    "id": "q-0333",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "行政强制执行是对不履行行政决定的当事人强制履行义务或实现相同状态。"
  },
  {
    "id": "q-0334",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "行政强制措施必须以一个已经生效且未履行的基础决定为前提。"
  },
  {
    "id": "q-0335",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "行政强制执行通常以一个未履行的基础行政决定为前提。"
  },
  {
    "id": "q-0336",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "一上来直接扣押涉案车辆，通常属于行政强制措施。"
  },
  {
    "id": "q-0337",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "先责令限期拆除，逾期不拆后强制拆除，后者通常属于行政强制执行。"
  },
  {
    "id": "q-0338",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "查封、扣押、冻结均属于行政强制措施。"
  },
  {
    "id": "q-0339",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "加处罚款和滞纳金属于行政处罚。"
  },
  {
    "id": "q-0340",
    "phase": "Phase 3",
    "category": "行政强制基础",
    "text": "执行罚的目的主要是惩戒过去违法行为。"
  },
  {
    "id": "q-0341",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "行政强制措施原则上由法律设定。"
  },
  {
    "id": "q-0342",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "行政法规可以设定限制人身自由的行政强制措施。"
  },
  {
    "id": "q-0343",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "行政法规可以设定冻结措施。"
  },
  {
    "id": "q-0344",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "地方性法规可以设定查封、扣押强制措施。"
  },
  {
    "id": "q-0345",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "地方性法规可以设定冻结措施。"
  },
  {
    "id": "q-0346",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "规章可以设定行政强制措施。"
  },
  {
    "id": "q-0347",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "行政强制执行只能由法律设定。"
  },
  {
    "id": "q-0348",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "行政强制措施权可以委托实施。"
  },
  {
    "id": "q-0349",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "行政机关可以委托停车场保管已扣押车辆，这属于行政强制措施权委托。"
  },
  {
    "id": "q-0350",
    "phase": "Phase 3",
    "category": "行政强制设定权与实施主体",
    "text": "行政强制措施授权层级通常高于一般行政行为授权。"
  },
  {
    "id": "q-0351",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "实施行政强制措施通常应由两名以上执法人员实施。"
  },
  {
    "id": "q-0352",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "实施行政强制措施通常应出示执法证件。"
  },
  {
    "id": "q-0353",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "实施行政强制措施一般应通知当事人到场。"
  },
  {
    "id": "q-0354",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "实施行政强制措施应告知理由、依据以及当事人依法享有的权利、救济途径。"
  },
  {
    "id": "q-0355",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "行政强制措施程序中通常没有正式听证程序。"
  },
  {
    "id": "q-0356",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "紧急情况下实施财产类强制措施后，可以在二十四小时内补办批准手续。"
  },
  {
    "id": "q-0357",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "限制人身自由的紧急强制措施，返回机关后可以等二十四小时再报告。"
  },
  {
    "id": "q-0358",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "现场笔录必须由执法人员签名。"
  },
  {
    "id": "q-0359",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "当事人拒绝在现场笔录上签名的，执法人员应注明原因。"
  },
  {
    "id": "q-0360",
    "phase": "Phase 3",
    "category": "行政强制措施程序",
    "text": "当事人不在场的，应邀请见证人到场并签名。"
  },
  {
    "id": "q-0361",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "查封、扣押限于涉案场所、设施或财物。"
  },
  {
    "id": "q-0362",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "行政机关可以查封、扣押与案件无关的财物以督促当事人配合调查。"
  },
  {
    "id": "q-0363",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "行政机关不得查封、扣押公民个人及其所扶养家属的生活必需品。"
  },
  {
    "id": "q-0364",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "同一财物已被其他国家机关依法查封的，行政机关不得重复查封。"
  },
  {
    "id": "q-0365",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "查封、扣押时应当当场交付决定书和清单。"
  },
  {
    "id": "q-0366",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "查封、扣押期限一般不得超过三十日。"
  },
  {
    "id": "q-0367",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "查封、扣押复杂情况下经批准可以延长三十日。"
  },
  {
    "id": "q-0368",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "检验、检测、检疫、技术鉴定期间一般计入查封扣押期限。"
  },
  {
    "id": "q-0369",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "查封、扣押财物的保管费用由当事人承担。"
  },
  {
    "id": "q-0370",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "冻结通常先通知当事人，再通知金融机构冻结，防止突袭。"
  },
  {
    "id": "q-0371",
    "phase": "Phase 3",
    "category": "查封、扣押、冻结",
    "text": "行政机关作出冻结决定后，应在三日内向当事人交付冻结决定书。"
  },
  {
    "id": "q-0372",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "行政强制执行前通常应先催告当事人履行。"
  },
  {
    "id": "q-0373",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "催告后，当事人有权陈述、申辩。"
  },
  {
    "id": "q-0374",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "行政机关可以与当事人达成执行协议，约定分阶段履行。"
  },
  {
    "id": "q-0375",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "执行协议可以减免罚款本金。"
  },
  {
    "id": "q-0376",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "行政机关不得在夜间或法定节假日实施行政强制执行，但紧急情况除外。"
  },
  {
    "id": "q-0377",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "行政机关夜间不得采取任何行政强制措施。"
  },
  {
    "id": "q-0378",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "行政机关不得对居民生活采取断水、断电、断热、断气等方式迫使履行行政决定。"
  },
  {
    "id": "q-0379",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "代履行适用于可以由他人替代履行的义务。"
  },
  {
    "id": "q-0380",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "行政拘留可以代履行。"
  },
  {
    "id": "q-0381",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "代履行费用原则上由义务人承担。"
  },
  {
    "id": "q-0382",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "紧急情况下，为保障交通安全或防止污染扩大，可以立即代履行。"
  },
  {
    "id": "q-0383",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "行政机关申请法院强制执行前，一般需等待履行期、复议期、起诉期届满。"
  },
  {
    "id": "q-0384",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "行政机关申请法院强制执行通常应在三期届满后三个月内提出。"
  },
  {
    "id": "q-0385",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "行政机关申请法院强制执行，由法院执行局直接审查行政行为合法性。"
  },
  {
    "id": "q-0386",
    "phase": "Phase 3",
    "category": "行政强制执行",
    "text": "非诉执行中，法院一般采用书面审查，发现明显违法时可听取双方意见。"
  },
  {
    "id": "q-0387",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "行政复议和行政诉讼都是解决行政争议的重要救济途径。"
  },
  {
    "id": "q-0388",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "行政复议由人民法院进行审查。"
  },
  {
    "id": "q-0389",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "行政诉讼由人民法院审查行政行为是否合法。"
  },
  {
    "id": "q-0390",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "行政复议通常既审查合法性，也审查适当性。"
  },
  {
    "id": "q-0391",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "行政诉讼通常不仅审查合法性，还全面审查行政行为的适当性。"
  },
  {
    "id": "q-0392",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "行政复议决定本身属于行政行为。"
  },
  {
    "id": "q-0393",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "一般行政争议中，当事人原则上可以选择直接起诉，也可以先申请复议。"
  },
  {
    "id": "q-0394",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "一旦法院已经依法受理同一行政争议，当事人仍可再申请行政复议。"
  },
  {
    "id": "q-0395",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "行政复议机关已经依法受理的，复议期间当事人不得就同一行政行为再向法院起诉。"
  },
  {
    "id": "q-0396",
    "phase": "Phase 3",
    "category": "行政复议与行政诉讼关系",
    "text": "复议前置是指当事人必须先申请复议，对复议结果不服才可起诉。"
  },
  {
    "id": "q-0397",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "所有行政处罚案件都必须先复议再起诉。"
  },
  {
    "id": "q-0398",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "对当场作出的行政处罚决定不服，属于新复议法下复议前置的重要情形。"
  },
  {
    "id": "q-0399",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "对已经依法取得的自然资源所有权或使用权被行政决定侵犯的，通常属于复议前置情形。"
  },
  {
    "id": "q-0400",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "房屋所有权争议一律属于自然资源权属复议前置。"
  },
  {
    "id": "q-0401",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "申请行政机关履行法定职责，行政机关不履行的，可能属于复议前置。"
  },
  {
    "id": "q-0402",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "申请政府信息公开，行政机关不予公开的，属于复议前置。"
  },
  {
    "id": "q-0403",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "纳税争议通常可以不经复议直接起诉。"
  },
  {
    "id": "q-0404",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "税务处罚、税收强制执行措施、税收保全措施通常可以直接起诉。"
  },
  {
    "id": "q-0405",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "复议前置案件未经复议直接起诉，法院通常应进入实体审理后驳回诉讼请求。"
  },
  {
    "id": "q-0406",
    "phase": "Phase 3",
    "category": "复议前置",
    "text": "复议前置案件中，行政机关作出行政行为时应告知相对人先申请行政复议。"
  },
  {
    "id": "q-0407",
    "phase": "Phase 3",
    "category": "复议终局",
    "text": "复议终局是指复议决定作出后，当事人不得再提起行政诉讼。"
  },
  {
    "id": "q-0408",
    "phase": "Phase 3",
    "category": "复议终局",
    "text": "所有外国人行政案件都属于复议终局。"
  },
  {
    "id": "q-0409",
    "phase": "Phase 3",
    "category": "复议终局",
    "text": "外国人对继续盘问、拘留审查、限制活动范围、遣送出境等出入境管理措施不服，复议决定可能为终局。"
  },
  {
    "id": "q-0410",
    "phase": "Phase 3",
    "category": "复议终局",
    "text": "中国公民对行政拘留不服申请复议后，复议决定一律终局。"
  },
  {
    "id": "q-0411",
    "phase": "Phase 3",
    "category": "复议终局",
    "text": "对省级政府或国务院部门自我复议后，当事人选择向国务院申请裁决的，国务院裁决通常为最终裁决。"
  },
  {
    "id": "q-0412",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "行政处罚、行政强制、行政许可争议通常可以申请行政复议。"
  },
  {
    "id": "q-0413",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "对行政机关不依法履行法定职责不服，通常可以申请行政复议。"
  },
  {
    "id": "q-0414",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "对政府信息公开答复不服，通常可以申请行政复议。"
  },
  {
    "id": "q-0415",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "对行政协议的订立、履行、变更、解除等争议，完全不能申请行政复议。"
  },
  {
    "id": "q-0416",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "对工伤认定不服，可以申请行政复议。"
  },
  {
    "id": "q-0417",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "对行政机关作出的行政赔偿决定不服，可以申请行政复议。"
  },
  {
    "id": "q-0418",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "对行政机关滥用行政权力排除或限制竞争不服，可以申请行政复议。"
  },
  {
    "id": "q-0419",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "国防、外交等国家行为属于行政复议范围。"
  },
  {
    "id": "q-0420",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "行政法规、规章、规范性文件本身可以单独申请行政复议。"
  },
  {
    "id": "q-0421",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "行政机关对公务员作出的奖惩、任免等内部人事处理，通常不属于行政复议范围。"
  },
  {
    "id": "q-0422",
    "phase": "Phase 3",
    "category": "行政复议受案范围",
    "text": "行政机关对民事纠纷作出的调解，通常不属于行政复议范围。"
  },
  {
    "id": "q-0423",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对县市场监管局作出的处罚不服，通常向县政府申请行政复议。"
  },
  {
    "id": "q-0424",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对市生态环境局作出的行政行为不服，通常由市政府管辖复议。"
  },
  {
    "id": "q-0425",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对县公安局处罚不服，复议机关通常是县政府。"
  },
  {
    "id": "q-0426",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对公安派出所以自己名义作出的授权范围内治安处罚不服，通常向区/县政府申请复议。"
  },
  {
    "id": "q-0427",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对税务机关行政行为不服，通常向同级政府申请复议。"
  },
  {
    "id": "q-0428",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对海关行政行为不服，向本级人民政府申请复议。"
  },
  {
    "id": "q-0429",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对金融、外汇管理等垂直领导机关行政行为不服，通常向上一级主管部门申请复议。"
  },
  {
    "id": "q-0430",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对国家安全机关行政行为不服，通常向本级政府申请复议。"
  },
  {
    "id": "q-0431",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对乡政府作出的行政行为不服，通常由县级政府管辖复议。"
  },
  {
    "id": "q-0432",
    "phase": "Phase 3",
    "category": "行政复议管辖",
    "text": "对省政府作出的行政行为不服，通常向国务院申请行政复议。"
  },
  {
    "id": "q-0433",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "一般行政复议申请期限为知道或应当知道行政行为之日起 60 日。"
  },
  {
    "id": "q-0434",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "行政复议申请期限通常为 6 个月。"
  },
  {
    "id": "q-0435",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "行政机关未告知复议权利、复议机关和申请期限的，复议申请期限可能从知道这些事项时起算，但有最长限制。"
  },
  {
    "id": "q-0436",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "不动产类复议案件的最长保护期限通常为行政行为作出后 20 年。"
  },
  {
    "id": "q-0437",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "其他复议案件的最长保护期限通常为行政行为作出后 5 年。"
  },
  {
    "id": "q-0438",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "行政复议机关收到申请后，通常应在 5 日内进行审查。"
  },
  {
    "id": "q-0439",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "行政复议材料不齐或表述不清的，复议机关可以要求补正。"
  },
  {
    "id": "q-0440",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "复议普通程序一般应在受理后 60 日内作出决定。"
  },
  {
    "id": "q-0441",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "复议普通程序情况复杂的，可以无限期延长。"
  },
  {
    "id": "q-0442",
    "phase": "Phase 3",
    "category": "行政复议期限",
    "text": "行政复议简易程序一般应在受理后 30 日内作出决定。"
  },
  {
    "id": "q-0443",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "行政诉讼以行政行为侵犯合法权益为基本受案逻辑。"
  },
  {
    "id": "q-0444",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "行政处罚通常属于行政诉讼受案范围。"
  },
  {
    "id": "q-0445",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "行政强制措施和行政强制执行通常属于行政诉讼受案范围。"
  },
  {
    "id": "q-0446",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "行政许可争议通常属于行政诉讼受案范围。"
  },
  {
    "id": "q-0447",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "自然资源权属确认争议通常属于行政诉讼受案范围。"
  },
  {
    "id": "q-0448",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "行政不作为通常不属于行政诉讼受案范围。"
  },
  {
    "id": "q-0449",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "行政协议争议已经纳入行政诉讼受案范围。"
  },
  {
    "id": "q-0450",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "行政法规、规章可以作为行政诉讼直接起诉对象。"
  },
  {
    "id": "q-0451",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "国务院部门和地方政府及其部门制定的规范性文件，可以在起诉具体行政行为时一并请求审查，但不含规章。"
  },
  {
    "id": "q-0452",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "法院认为被诉行政行为所依据的规范性文件不合法，可以在本案中不作为认定行政行为合法的依据。"
  },
  {
    "id": "q-0453",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "公务员处分、任免等内部行为通常可以直接提起行政诉讼。"
  },
  {
    "id": "q-0454",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "行政机关作出的真行政指导通常可诉。"
  },
  {
    "id": "q-0455",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "行政机关作出的重复处理行为通常不可诉。"
  },
  {
    "id": "q-0456",
    "phase": "Phase 3",
    "category": "行政诉讼受案范围",
    "text": "信访答复一律不可诉。"
  },
  {
    "id": "q-0457",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "行政诉讼原告资格的核心是与被诉行政行为存在法律上的利害关系。"
  },
  {
    "id": "q-0458",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "行政行为的直接相对人通常具有原告资格。"
  },
  {
    "id": "q-0459",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "与行政行为只有情感上、心理上的不满，也当然具有原告资格。"
  },
  {
    "id": "q-0460",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "被行政拘留者的父母仅因心疼子女，通常不能以自己名义起诉拘留决定。"
  },
  {
    "id": "q-0461",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "行政行为直接相对人死亡后，其近亲属可能继承原告资格。"
  },
  {
    "id": "q-0462",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "房屋所有权人对征收决定通常具有原告资格。"
  },
  {
    "id": "q-0463",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "建设许可影响邻居采光、通风等相邻权益的，邻居可能具有原告资格。"
  },
  {
    "id": "q-0464",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "竞争者认为行政许可给竞争对手损害公平竞争利益的，绝对没有原告资格。"
  },
  {
    "id": "q-0465",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "股份制企业被行政处罚，单个股东原则上可以直接以个人名义起诉。"
  },
  {
    "id": "q-0466",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "行政行为直接处分投资人权益时，投资人可能具有原告资格。"
  },
  {
    "id": "q-0467",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "合同关系中，只要行政行为间接影响合同履行，合同相对人一定有行政诉讼原告资格。"
  },
  {
    "id": "q-0468",
    "phase": "Phase 3",
    "category": "行政诉讼原告资格",
    "text": "合同关系中无民事救济途径且行政行为直接破坏合同权益的，可能具有行政诉讼原告资格。"
  },
  {
    "id": "q-0469",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "直接起诉时，作出行政行为的行政机关通常是被告。"
  },
  {
    "id": "q-0470",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "两个以上行政机关共同作出同一行政行为的，应列共同被告。"
  },
  {
    "id": "q-0471",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "行政机关委托组织作出行政行为的，受委托组织是被告。"
  },
  {
    "id": "q-0472",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "被授权组织以自己名义作出授权范围内行政行为的，被授权组织可以作为被告。"
  },
  {
    "id": "q-0473",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "临时机构以自己名义作出行政行为的，临时机构通常可以作为被告。"
  },
  {
    "id": "q-0474",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "行政机关被撤销后，继续行使其职权的机关通常是被告。"
  },
  {
    "id": "q-0475",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "内设机构作出行政行为的，通常以内设机构为被告。"
  },
  {
    "id": "q-0476",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "派出机构幅度越权作出处罚时，仍可能以派出机构为被告。"
  },
  {
    "id": "q-0477",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "派出机构种类越权作出行为时，通常告所属行政机关。"
  },
  {
    "id": "q-0478",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "街道办事处是派出机关，通常具有独立被告资格。"
  },
  {
    "id": "q-0479",
    "phase": "Phase 3",
    "category": "行政诉讼被告：直接起诉",
    "text": "经上级批准的行政行为，一律以上级批准机关为被告。"
  },
  {
    "id": "q-0480",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议维持原行政行为的，原机关和复议机关为共同被告。"
  },
  {
    "id": "q-0481",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议改变原行政行为的，只以复议机关为被告。"
  },
  {
    "id": "q-0482",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议机关逾期不作决定，原告起诉原行政行为的，以原机关为被告。"
  },
  {
    "id": "q-0483",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议机关逾期不作决定，原告起诉复议不作为的，以复议机关为被告。"
  },
  {
    "id": "q-0484",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议机关仅改变原行政行为的法律依据但实体结果不变，通常属于复议改变。"
  },
  {
    "id": "q-0485",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议机关确认原行为程序违法但维持实体结果，通常仍属于复议维持。"
  },
  {
    "id": "q-0486",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议机关将罚款 5000 元改为 1000 元，属于复议改变。"
  },
  {
    "id": "q-0487",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议维持案件中，原告只起诉原机关的，法院可以通知追加复议机关。"
  },
  {
    "id": "q-0488",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议维持案件中，原告不同意追加复议机关的，法院只能驳回起诉。"
  },
  {
    "id": "q-0489",
    "phase": "Phase 3",
    "category": "经过复议后的被告",
    "text": "复议不作为时，原告必须同时起诉原机关和复议机关。"
  },
  {
    "id": "q-0490",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "必要共同诉讼通常因同一行政行为产生，法院必须合并审理。"
  },
  {
    "id": "q-0491",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "普通共同诉讼通常因同类行政行为产生，法院可以在条件具备时合并审理。"
  },
  {
    "id": "q-0492",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "普通共同诉讼合并审理不需要当事人同意。"
  },
  {
    "id": "q-0493",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "多个村民因同一土地征收决定起诉，通常属于必要共同诉讼。"
  },
  {
    "id": "q-0494",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "多家烧烤店分别因各自违法被同一机关处罚，属于必要共同诉讼。"
  },
  {
    "id": "q-0495",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "行政诉讼第三人与被诉行政行为存在法律上的利害关系。"
  },
  {
    "id": "q-0496",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "行政诉讼第三人没有独立诉讼地位，不能上诉。"
  },
  {
    "id": "q-0497",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "行政许可案件中，原告请求撤销他人许可，该被许可人通常可以作为第三人。"
  },
  {
    "id": "q-0498",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "第三人只能由法院通知参加，不能主动申请参加诉讼。"
  },
  {
    "id": "q-0499",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "人数众多的共同诉讼中，可以推选诉讼代表人。"
  },
  {
    "id": "q-0500",
    "phase": "Phase 3",
    "category": "行政诉讼共同诉讼、第三人",
    "text": "诉讼代表人可以不经被代表人同意，直接放弃实体诉讼请求。"
  },
  {
    "id": "q-0501",
    "phase": "Phase 3",
    "category": "行政诉讼级别管辖",
    "text": "行政诉讼级别管辖通常先默认基层法院。"
  },
  {
    "id": "q-0502",
    "phase": "Phase 3",
    "category": "行政诉讼级别管辖",
    "text": "对县级以上地方政府作出的行政行为起诉，一审通常由中级法院管辖。"
  },
  {
    "id": "q-0503",
    "phase": "Phase 3",
    "category": "行政诉讼级别管辖",
    "text": "对县公安局作出的处罚起诉，一审当然由中级法院管辖。"
  },
  {
    "id": "q-0504",
    "phase": "Phase 3",
    "category": "行政诉讼级别管辖",
    "text": "对县政府作出的征收决定起诉，一审通常由中级法院管辖。"
  },
  {
    "id": "q-0505",
    "phase": "Phase 3",
    "category": "行政诉讼级别管辖",
    "text": "对国务院部门作出的行政行为起诉，一审通常由中级法院管辖。"
  },
  {
    "id": "q-0506",
    "phase": "Phase 3",
    "category": "行政诉讼级别管辖",
    "text": "海关处理的案件通常由中级法院一审管辖。"
  },
  {
    "id": "q-0507",
    "phase": "Phase 3",
    "category": "行政诉讼级别管辖",
    "text": "涉外行政案件通常属于中级法院管辖。"
  },
  {
    "id": "q-0508",
    "phase": "Phase 3",
    "category": "行政诉讼级别管辖",
    "text": "复议维持共同被告案件的级别管辖，以复议机关确定。"
  },
  {
    "id": "q-0509",
    "phase": "Phase 3",
    "category": "行政诉讼级别管辖",
    "text": "县公安局处罚，县政府复议维持，起诉时因县政府为共同被告，所以一定由中院管辖。"
  },
  {
    "id": "q-0510",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "一般行政案件由最初作出行政行为的行政机关所在地法院管辖。"
  },
  {
    "id": "q-0511",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "经过复议的案件，也可以由复议机关所在地法院管辖。"
  },
  {
    "id": "q-0512",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "经过复议的案件，只能由复议机关所在地法院管辖。"
  },
  {
    "id": "q-0513",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "因不动产提起的行政诉讼，由不动产所在地法院管辖。"
  },
  {
    "id": "q-0514",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "所有与房屋、土地相关的行政案件，都当然适用不动产专属管辖。"
  },
  {
    "id": "q-0515",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "限制人身自由的行政强制措施案件，可以由被告所在地或原告所在地法院管辖。"
  },
  {
    "id": "q-0516",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "行政拘留作为行政处罚，也当然适用限制人身自由强制措施的特殊地域管辖。"
  },
  {
    "id": "q-0517",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "原告所在地包括户籍所在地、经常居住地和被限制人身自由地等。"
  },
  {
    "id": "q-0518",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "既涉及不动产又经过复议的案件，通常仍优先适用不动产所在地专属管辖。"
  },
  {
    "id": "q-0519",
    "phase": "Phase 3",
    "category": "行政诉讼地域管辖",
    "text": "行政诉讼管辖应先定被告，再判断级别和地域。"
  },
  {
    "id": "q-0520",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "直接起诉的一般期限为知道或应当知道行政行为之日起 6 个月。"
  },
  {
    "id": "q-0521",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "复议后起诉的一般期限为收到复议决定书之日起 15 日。"
  },
  {
    "id": "q-0522",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "复议机关逾期不作决定的，通常自复议期限届满之日起 15 日内起诉。"
  },
  {
    "id": "q-0523",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "行政诉讼起诉期限与民事诉讼时效完全相同，均可自由中断。"
  },
  {
    "id": "q-0524",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "因不动产提起行政诉讼的最长保护期限通常为行政行为作出后 20 年。"
  },
  {
    "id": "q-0525",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "其他行政案件最长保护期限通常为行政行为作出后 5 年。"
  },
  {
    "id": "q-0526",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "当事人完全不知道行政行为内容的，起诉期限可以无限延长。"
  },
  {
    "id": "q-0527",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "行政机关错误告知起诉期限较长并导致当事人超期的，可能对当事人予以保护。"
  },
  {
    "id": "q-0528",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "行政机关告知起诉期限短于法定期限的，应按法定期限计算。"
  },
  {
    "id": "q-0529",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "单纯多年信访通常可以中止或延长行政诉讼起诉期限。"
  },
  {
    "id": "q-0530",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "对消极不作为起诉，通常要等行政机关法定或合理履职期限届满。"
  },
  {
    "id": "q-0531",
    "phase": "Phase 3",
    "category": "行政诉讼起诉期限",
    "text": "请求保护人身权、财产权的紧急情况下，行政机关不履职，仍必须等待两个月才能起诉。"
  },
  {
    "id": "q-0532",
    "phase": "Phase 3",
    "category": "起诉与受理条件",
    "text": "行政诉讼起诉应有适格原告。"
  },
  {
    "id": "q-0533",
    "phase": "Phase 3",
    "category": "起诉与受理条件",
    "text": "起诉行政案件必须有明确被告。"
  },
  {
    "id": "q-0534",
    "phase": "Phase 3",
    "category": "起诉与受理条件",
    "text": "行政诉讼请求可以完全笼统写成“请求法院处理”。"
  },
  {
    "id": "q-0535",
    "phase": "Phase 3",
    "category": "起诉与受理条件",
    "text": "被诉行为必须属于行政诉讼受案范围。"
  },
  {
    "id": "q-0536",
    "phase": "Phase 3",
    "category": "起诉与受理条件",
    "text": "起诉法院必须有管辖权。"
  },
  {
    "id": "q-0537",
    "phase": "Phase 3",
    "category": "起诉与受理条件",
    "text": "对同一行政行为已经起诉并处理后，原则上不得重复起诉。"
  },
  {
    "id": "q-0538",
    "phase": "Phase 3",
    "category": "起诉与受理条件",
    "text": "判断是否重复起诉，关键只看诉讼请求是否完全相同。"
  },
  {
    "id": "q-0539",
    "phase": "Phase 3",
    "category": "起诉与受理条件",
    "text": "原告起诉对象错误的，法院可以告知其变更被告。"
  },
  {
    "id": "q-0540",
    "phase": "Phase 3",
    "category": "起诉与受理条件",
    "text": "原告拒绝变更错误被告的，法院可以裁定驳回起诉。"
  },
  {
    "id": "q-0541",
    "phase": "Phase 3",
    "category": "行政诉讼证据基础",
    "text": "行政诉讼证据包括书证、物证、视听资料、电子数据、证人证言、当事人陈述、鉴定意见、勘验笔录和现场笔录等。"
  },
  {
    "id": "q-0542",
    "phase": "Phase 3",
    "category": "行政诉讼证据基础",
    "text": "行政诉讼中，所有提交给法院的材料都当然可以作为定案依据。"
  },
  {
    "id": "q-0543",
    "phase": "Phase 3",
    "category": "行政诉讼证据基础",
    "text": "以非法手段取得的证据，通常不得作为认定案件事实的根据。"
  },
  {
    "id": "q-0544",
    "phase": "Phase 3",
    "category": "行政诉讼证据基础",
    "text": "行政机关作出处罚决定时形成的现场笔录，属于行政诉讼证据之一。"
  },
  {
    "id": "q-0545",
    "phase": "Phase 3",
    "category": "行政诉讼证据基础",
    "text": "执法记录仪形成的视频资料，可能属于视听资料或电子数据。"
  },
  {
    "id": "q-0546",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "行政诉讼中，被告行政机关通常对其作出的行政行为承担举证责任。"
  },
  {
    "id": "q-0547",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "行政诉讼完全适用民事诉讼中的“谁主张谁举证”，原告必须证明行政行为违法。"
  },
  {
    "id": "q-0548",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "被告应当提供作出行政行为的证据和所依据的规范性文件。"
  },
  {
    "id": "q-0549",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "被告无正当理由逾期提交证据的，通常视为没有相应证据。"
  },
  {
    "id": "q-0550",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "被告在行政诉讼中可以无限期补充作出行政行为时没有掌握的证据。"
  },
  {
    "id": "q-0551",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "行政机关在诉讼中补做的询问笔录，原则上不能用来证明原行政行为合法。"
  },
  {
    "id": "q-0552",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "被告在诉讼中不得自行向原告、第三人和证人收集证据。"
  },
  {
    "id": "q-0553",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "被告在诉讼期间向证人补充调查取得的证据，通常可以当然证明原行政行为合法。"
  },
  {
    "id": "q-0554",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "被告提交证据的期限通常是收到起诉状副本之日起 15 日内。"
  },
  {
    "id": "q-0555",
    "phase": "Phase 3",
    "category": "行政诉讼举证责任",
    "text": "被告不提交答辩状的，法院不能审理案件。"
  },
  {
    "id": "q-0556",
    "phase": "Phase 3",
    "category": "原告的举证责任",
    "text": "行政诉讼中，原告完全不承担任何举证责任。"
  },
  {
    "id": "q-0557",
    "phase": "Phase 3",
    "category": "原告的举证责任",
    "text": "原告通常需要证明被诉行政行为存在。"
  },
  {
    "id": "q-0558",
    "phase": "Phase 3",
    "category": "原告的举证责任",
    "text": "原告需要证明自己与被诉行政行为存在法律上的利害关系。"
  },
  {
    "id": "q-0559",
    "phase": "Phase 3",
    "category": "原告的举证责任",
    "text": "不履行法定职责案件中，原告原则上应证明曾向行政机关提出申请。"
  },
  {
    "id": "q-0560",
    "phase": "Phase 3",
    "category": "原告的举证责任",
    "text": "行政赔偿、补偿案件中，原告通常应对损害事实提供证据。"
  },
  {
    "id": "q-0561",
    "phase": "Phase 3",
    "category": "原告的举证责任",
    "text": "原告请求撤销处罚决定时，必须证明行政机关适用法律错误。"
  },
  {
    "id": "q-0562",
    "phase": "Phase 3",
    "category": "原告的举证责任",
    "text": "原告在不作为案件中无法提供申请证据的，一律败诉。"
  },
  {
    "id": "q-0563",
    "phase": "Phase 3",
    "category": "原告的举证责任",
    "text": "原告在国家赔偿案件中主张财产损失的，应尽量提交损失清单、评估材料、维修票据等证据。"
  },
  {
    "id": "q-0564",
    "phase": "Phase 3",
    "category": "法院调取证据",
    "text": "法院可以依职权调取证据。"
  },
  {
    "id": "q-0565",
    "phase": "Phase 3",
    "category": "法院调取证据",
    "text": "法院可以帮助行政机关调取其作出行政行为时没有收集的证据，以证明行政行为合法。"
  },
  {
    "id": "q-0566",
    "phase": "Phase 3",
    "category": "法院调取证据",
    "text": "法院依职权调取的证据，应当由法庭出示，并可说明情况、听取当事人意见。"
  },
  {
    "id": "q-0567",
    "phase": "Phase 3",
    "category": "法院调取证据",
    "text": "当事人申请法院调取的证据，通常应由申请调取证据的当事人在庭审中出示并质证。"
  },
  {
    "id": "q-0568",
    "phase": "Phase 3",
    "category": "法院调取证据",
    "text": "法院调取证据后，一律不需要听取当事人意见。"
  },
  {
    "id": "q-0569",
    "phase": "Phase 3",
    "category": "行政诉讼审理对象与审理方式",
    "text": "人民法院审理行政案件，主要审查行政行为是否合法。"
  },
  {
    "id": "q-0570",
    "phase": "Phase 3",
    "category": "行政诉讼审理对象与审理方式",
    "text": "行政诉讼中，法院原则上可以完全替行政机关重新作出行政管理决定。"
  },
  {
    "id": "q-0571",
    "phase": "Phase 3",
    "category": "行政诉讼审理对象与审理方式",
    "text": "法院审查行政行为合法性时，可以审查主体、事实、法律适用、程序和裁量明显不当等问题。"
  },
  {
    "id": "q-0572",
    "phase": "Phase 3",
    "category": "行政诉讼审理对象与审理方式",
    "text": "行政机关裁量明显不当时，法院完全不能处理。"
  },
  {
    "id": "q-0573",
    "phase": "Phase 3",
    "category": "行政诉讼审理对象与审理方式",
    "text": "一审行政案件原则上应开庭审理。"
  },
  {
    "id": "q-0574",
    "phase": "Phase 3",
    "category": "行政诉讼审理对象与审理方式",
    "text": "行政诉讼一审案件一律不公开审理。"
  },
  {
    "id": "q-0575",
    "phase": "Phase 3",
    "category": "行政诉讼审理对象与审理方式",
    "text": "涉及商业秘密的案件，当事人申请不公开审理的，可以不公开审理。"
  },
  {
    "id": "q-0576",
    "phase": "Phase 3",
    "category": "行政诉讼审理对象与审理方式",
    "text": "涉及国家秘密的行政案件，应不公开审理。"
  },
  {
    "id": "q-0577",
    "phase": "Phase 3",
    "category": "诉讼期间行政行为执行",
    "text": "行政诉讼期间，被诉行政行为原则上不停止执行。"
  },
  {
    "id": "q-0578",
    "phase": "Phase 3",
    "category": "诉讼期间行政行为执行",
    "text": "只要原告提起行政诉讼，行政行为立即停止执行。"
  },
  {
    "id": "q-0579",
    "phase": "Phase 3",
    "category": "诉讼期间行政行为执行",
    "text": "被告认为需要停止执行的，可以停止执行。"
  },
  {
    "id": "q-0580",
    "phase": "Phase 3",
    "category": "诉讼期间行政行为执行",
    "text": "原告申请停止执行，法院认为执行会造成难以弥补损失且停止不损害公共利益的，可以裁定停止执行。"
  },
  {
    "id": "q-0581",
    "phase": "Phase 3",
    "category": "诉讼期间行政行为执行",
    "text": "法院认为执行行政行为会给国家利益、社会公共利益造成重大损害的，可以裁定停止执行。"
  },
  {
    "id": "q-0582",
    "phase": "Phase 3",
    "category": "诉讼期间行政行为执行",

    "text": "法院审查行政协议时，可以审查行政机关是否具有法定职权。"

  {

    "phase": "Phase 3",
    "category": "行政协议举证与审查",

  {
    "id": "q-0682",
    "phase": "Phase 3",

    "text": "行政协议完全适用民事合同规则，行政法规则不再适用。"

  {
    "id": "q-0683",
    "phase": "Phase 3",

    "phase": "Phase 3",
    "category": "行政协议效力",

    "phase": "Phase 3",

  {

  },
  {

    "phase": "Phase 3",

  {
    "id": "q-0693",
    "phase": "Phase 3",
    "category": "行政协议诉讼二分法",
    "text": "双方围绕行政协议履约、违约发生争议时，法院会更多适用协议履行逻辑。"

  {
    "id": "q-0694",
    "phase": "Phase 3",
    "category": "行政协议诉讼二分法",
    "text": "行政协议案件中，单方变更解除争议和普通履约争议的审查思路完全相同。"

    "text": "征收补偿协议约定 100 万补偿，行政机关无正当依据单方改为 80 万，可能构成违法变更行政协议。"

  {
    "id": "q-0696",
    "phase": "Phase 3",
    "category": "行政协议诉讼二分法",
    "text": "行政机关未按行政协议约定支付款项，相对人可以请求继续履行或支付相应款项。"
  },
  {
    "id": "q-0697",

    "phase": "Phase 5",

    "phase": "Phase 5",
    "category": "国家赔偿基础",

  {

    "phase": "Phase 5",
    "category": "国家赔偿基础",

  },
  {
    "id": "q-0701",
    "phase": "Phase 5",
    "category": "国家赔偿基础",
    "text": "国家赔偿可以分为行政赔偿和司法赔偿。"
  },
  {
    "id": "q-0702",
    "phase": "Phase 5",
    "category": "国家赔偿基础",
    "text": "行政赔偿与司法赔偿的程序完全相同。"
  },
  {
    "id": "q-0703",
    "phase": "Phase 5",
    "category": "国家赔偿基础",
    "text": "国家赔偿的基本判断可以概括为主体、行为、损害、因果关系。"

  {
    "id": "q-0704",
    "phase": "Phase 5",
    "category": "国家赔偿基础",
    "text": "只要行政机关作出过行政行为，就必然产生国家赔偿责任。"

  {
    "id": "q-0705",
    "phase": "Phase 5",
    "category": "国家赔偿基础",
    "text": "国家赔偿通常要求存在实际损害。"

  {

    "phase": "Phase 5",

    "phase": "Phase 5",
    "category": "国家赔偿与行政补偿",

  {

    "phase": "Phase 5",

    "phase": "Phase 5",

    "phase": "Phase 5",
    "category": "行政赔偿范围",
    "text": "违法罚款、违法没收财物造成财产损失的，可能产生行政赔偿。"

    "category": "行政赔偿范围",

    "id": "q-0726",
    "phase": "Phase 5",
    "category": "行政赔偿范围",
    "text": "行政赔偿中，原告通常应对损害事实提供证据。"
  },
  {
    "id": "q-0727",

  {

    "phase": "Phase 5",

    "text": "违法罚款应当返还罚款。"

    "phase": "Phase 5",
    "category": "行政赔偿范围与计算",
    "text": "违法没收的财物仍存在的，应优先返还原物。"

  {
    "id": "q-0755",
    "phase": "Phase 5",
    "category": "行政赔偿范围与计算",
    "text": "违法没收财物已经灭失或不能返还的，可以折价赔偿。"

  {

    "category": "行政赔偿范围与计算",
    "text": "机动车停运期间的营运损失，可能属于行政赔偿中的直接损失。"

    "category": "行政赔偿范围与计算",
    "text": "存款利息、贷款利息、现金利息绝对不属于国家赔偿直接损失。"

  {
    "id": "q-0758",
    "phase": "Phase 5",
    "category": "行政赔偿范围与计算",

  {
    "id": "q-0759",
    "phase": "Phase 5",
    "category": "行政赔偿范围与计算",
    "text": "法人、非法人组织通常可以主张精神损害抚慰金。"

  {
    "id": "q-0760",
    "phase": "Phase 5",
    "category": "行政赔偿范围与计算",
    "text": "国家赔偿中的精神损害救济包括消除影响、恢复名誉、赔礼道歉，严重后果可支付精神损害抚慰金。"

  {
    "id": "q-0761",
    "phase": "Phase 5",
    "category": "行政赔偿范围与计算",
    "text": "行政机关违法造成公民身体伤害的，可能赔偿医疗费、护理费、误工减少收入等。"
  },
  {
    "id": "q-0762",
    "phase": "Phase 5",
    "category": "司法赔偿基础",
    "text": "司法赔偿是国家赔偿的一类。"
  },
  {
    "id": "q-0763",
    "phase": "Phase 5",
    "category": "司法赔偿基础",
    "text": "刑事司法赔偿是司法赔偿中的高频重点。"
  },
  {
    "id": "q-0764",
    "phase": "Phase 5",
    "category": "司法赔偿基础",
    "text": "民事、行政诉讼中的违法保全、违法执行也可能产生司法赔偿。"
  },
  {
    "id": "q-0765",
    "phase": "Phase 5",
    "category": "司法赔偿基础",
    "text": "司法赔偿可以直接称为“司法赔偿诉讼”。"
  },
  {
    "id": "q-0766",
    "phase": "Phase 5",
    "category": "司法赔偿基础",
    "text": "司法赔偿和行政赔偿虽然最终都可能由法院参与，但程序路径不同。"

    "id": "q-0767",
    "phase": "Phase 5",
    "category": "司法赔偿基础",
    "text": "刑事司法赔偿中，对错误限制公民人身自由的赔偿义务机关确定，可能采用“谁最后作有罪决定，谁赔”的后置思路。"

  {

  {

  },
  {
    "id": "q-0771",
    "phase": "Phase 5",

  {

    "phase": "Phase 5",
    "category": "刑事司法赔偿：“没罪关了就赔”",

    "category": "刑事司法赔偿：“没罪关了就赔”",

  {
    "id": "q-0775",
    "phase": "Phase 5",
    "category": "刑事司法赔偿：“没罪关了就赔”",
    "text": "证据不足不起诉、证据不足无罪，可能属于国家赔偿法上的终止追究刑事责任情形。"

  {
    "id": "q-0776",
    "phase": "Phase 5",
    "category": "刑事司法赔偿：“没罪关了就赔”",

    "category": "刑事司法赔偿：“没罪关了就赔”",

    "phase": "Phase 5",
    "category": "刑事司法赔偿：“没罪关了就赔”",
    "text": "免罪判决生效后仍继续羁押的，可能产生国家赔偿。"

    "phase": "Phase 5",
    "category": "刑事司法赔偿：“没罪关了就赔”",
    "text": "刑讯逼供造成身体伤害或死亡的，可能产生司法赔偿。"

  {
    "id": "q-0781",
    "phase": "Phase 5",
    "category": "刑事司法赔偿：“没罪关了就赔”",
    "text": "违法使用武器、警械造成公民伤害或死亡的，可能产生国家赔偿。"

  {
    "id": "q-0782",
    "phase": "Phase 5",
    "category": "刑事司法赔偿：“没罪关了就赔”",
    "text": "行为人有犯罪事实但后来因情节轻微不起诉的，羁押期间一定国家赔偿。"

  {
    "id": "q-0783",
    "phase": "Phase 5",
    "category": "刑事司法赔偿：“没罪关了就赔”",

  {
    "id": "q-0785",
    "phase": "Phase 5",
    "category": "民事、行政司法赔偿",
    "text": "法院对同一妨害诉讼行为重复采取罚款、拘留措施，可能属于违法采取妨害诉讼强制措施。"

  {

    "phase": "Phase 5",
    "category": "民事、行政司法赔偿",

  {
    "id": "q-0787",
    "phase": "Phase 5",
    "category": "民事、行政司法赔偿",
    "text": "受害人对损害结果发生或扩大也有过错的，国家一律不承担赔偿责任。"
